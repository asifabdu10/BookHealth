<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta name="description" content="Official Lab Technician Portal for BookHealth. Manage diagnostic requests, update center profile, and process health tests in real-time. Join the global health network.">
  <meta name="keywords" content="health lab, diagnostic portal, BookHealth, laboratory management, lab technician portal">
  <meta name="author" content="BookHealth">

  <!-- Open Graph (for social media sharing) -->
  <meta property="og:title" content="BookHealth - Laboratory Hub">
  <meta property="og:description" content="Empowering diagnostic centers with real-time health management tools.">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://bookhealth-lab-8bdcf.web.app">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="BookHealth Lab Hub">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>BookHealth - Laboratory Technician Hub</title>
  <link rel="manifest" href="manifest.json">
</head>
<body>
  <!--
    You can customize the "flutter_bootstrap.js" script.
    This is useful to provide a custom configuration to the Flutter loader
    or to give the user feedback during the initialization process.

    For more details:
    * https://docs.flutter.dev/platform-integration/web/initialization
  -->
  <script src="flutter_bootstrap.js" async></script>
  <style>
    .loading {
      display: flex;
      justify-content: center;
      align-items: center;
      margin: 0;
      position: absolute;
      top: 50%;
      left: 50%;
      -ms-transform: translate(-50%, -50%);
      transform: translate(-50%, -50%);
      font-family: 'Inter', sans-serif;
    }
  </style>
  <div id="loading-indicator" class="loading">
    <div style="text-align: center;">
      <img src="favicon.png" width="80px" height="80px" style="margin-bottom: 20px;" />
      <h2 style="color: #024950;">Loading BookHealth...</h2>
      <p style="color: #666;">Please wait while we initialize the Laboratory Hub.</p>
    </div>
  </div>
  <script>
    window.addEventListener('load', function(ev) {
      // Create a fallback to hide loader if flutter fails to start
      setTimeout(function() {
        var loader = document.getElementById('loading-indicator');
        if (loader && !window._flutter) {
           console.warn('Flutter did not initialize within 10 seconds.');
        }
      }, 10000);
    });
  </script>
</body>
</html>
